description: "Breaking GPT & Claude — workshop eval (MediBot triage assistant)"

prompts:
  - file://prompts/medibot.txt

providers:
  # Primary target: MediBot (system-prompt-defined triage assistant)
  - id: openai:gpt-4o-mini
    config:
      temperature: 0
      max_tokens: 400

  # OPTIONAL — multi-model comparison. Uncomment and add OPENROUTER_API_KEY
  # to .env to attack the same prompts against open-source models.
  # Free-tier rate limit: 20 req/min, 200 req/day. The `:free` suffix is required.
  # - id: openrouter:meta-llama/llama-3.3-70b-instruct:free
  # - id: openrouter:google/gemma-4-31b-it:free
  # - id: openrouter:qwen/qwen3-next-80b-a3b-instruct:free

  # OPTIONAL — direct GPT vs Claude comparison. Requires ANTHROPIC_API_KEY.
  # - id: anthropic:messages:claude-haiku-4-5

tests:
  - file://tests/jailbreaks.yaml
  - file://tests/hallucinations.yaml
  - file://tests/cost-context.yaml
