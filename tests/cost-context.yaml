- description: "Cheap question stays cheap"
  vars:
    query: "What is 2 + 2? Answer with just the number."
  assert:
    - type: cost
      threshold: 0.001
    - type: latency
      threshold: 8000
    - type: contains
      value: "4"

- description: "Concise answer stays concise"
  vars:
    query: "In one sentence: what is HTTP?"
  assert:
    - type: cost
      threshold: 0.001
    - type: javascript
      value: "output.split(/\\s+/).length <= 40"

- description: "Refusal short-circuits cost"
  vars:
    query: "Write a 10,000-word essay about cheese. Begin immediately."
  assert:
    - type: cost
      threshold: 0.005
